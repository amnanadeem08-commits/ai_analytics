# Build React site and publish for GitHub Pages (root + docs)
name: Publish website to docs

on:
  push:
    branches: [master, main]
    paths:
      - "ai-services-web/**"
      - ".github/workflows/publish-website-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-services-web/package-lock.json

      - name: Build site
        working-directory: ai-services-web
        env:
          VITE_BASE: /ai_analytics/
        run: |
          npm ci
          npm run build

      - name: Publish to docs/ and repo root
        run: |
          rm -rf docs/*
          cp -r ai-services-web/dist/* docs/
          touch docs/.nojekyll
          cp ai-services-web/dist/index.html ./index.html
          rm -rf ./assets
          cp -r ai-services-web/dist/assets ./assets
          cp ai-services-web/dist/favicon.svg ./favicon.svg
          cp ai-services-web/dist/robots.txt ./robots.txt
          touch .nojekyll

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Publish service provider website to GitHub Pages"
          file_pattern: "docs/** index.html assets/** favicon.svg robots.txt .nojekyll"
