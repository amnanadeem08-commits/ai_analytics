# Deploy React marketing site to GitHub Pages (NOT Streamlit).
# Live URL: https://amnanadeem08-commits.github.io/ai_analytics/
name: Deploy website to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "ai-services-web/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-services-web/package-lock.json

      - name: Install & build
        working-directory: ai-services-web
        env:
          VITE_BASE: /ai_analytics/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ai-services-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
